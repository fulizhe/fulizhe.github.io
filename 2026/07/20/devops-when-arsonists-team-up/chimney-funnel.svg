<svg viewBox="0 0 680 340" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
<title>技术栈分层中问题流与责任流的不对称</title>
<desc>展示前端-Java-Go-C++四层技术栈中，问题从下往上暴露（火从烟囱口冒出），责任从上往下甩（到Java被截住），Java既是入口又是背锅位，但也是唯一能看到全链路的位置。</desc>
<defs>
  <marker id="arrowUp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowDown" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="500" fill="#2C2C2A">问题向上冒，责任向下扣 —— 你卡在烟囱口</text>

<g>
  <rect x="200" y="56" width="280" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#0C447C">前端</text>
</g>

<g>
  <rect x="180" y="120" width="320" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="340" y="140" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">上层后端 —— 后端最上层入口</text>
  <text x="340" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">没定位根因前，锅在这里截住</text>
</g>

<g>
  <rect x="200" y="200" width="280" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">中间层（Go）</text>
</g>

<g>
  <rect x="200" y="268" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">底层（C/C++）</text>
</g>

<g>
  <line x1="100" y1="290" x2="100" y2="74" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <text x="60" y="182" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D" transform="rotate(-90 60 182)">问题暴露方向（火往上冒）</text>
</g>

<g>
  <line x1="580" y1="78" x2="580" y2="294" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="620" y="186" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5" transform="rotate(90 620 186)">责任甩锅方向（往下扣）</text>
</g>

<text x="340" y="328" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">你是烟囱口，也是唯一能看清全链路的人 —— 这是困境，也是刀</text>

</svg>
